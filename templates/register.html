{% extends "base.html" %}

{% block title %}Create Account — OpenBenchML{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join OpenBenchML and start benchmarking your models.</p>

        {% if error %}
        <div class="alert alert-danger" style="margin-bottom: 1.25rem;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/register">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Create Account</button>
        </form>

        <div class="auth-divider">or</div>

        <p style="text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            Already have an account? <a href="/login" style="color: var(--accent); font-weight: 600;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
