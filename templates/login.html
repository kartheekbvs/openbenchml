{% extends "base.html" %}

{% block title %}Sign In — OpenBenchML{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Sign In</h2>
        <p class="auth-subtitle">Welcome back! Log in to your OpenBenchML account.</p>

        {% if error %}
        <div class="alert alert-danger" style="margin-bottom: 1.25rem;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Sign In</button>
        </form>

        <div class="auth-divider">or</div>

        <p style="text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            Don't have an account? <a href="/register" style="color: var(--accent); font-weight: 600;">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
