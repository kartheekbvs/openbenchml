services:
  - type: web
    name: openbenchml
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: USE_SQLITE
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: openbenchml-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: openbenchml-redis
          type: redis
          property: connectionString
    plan: starter

  - type: redis
    name: openbenchml-redis
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: openbenchml-db
    plan: starter
