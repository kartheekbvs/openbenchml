# ─── OpenBenchML Docker Compose ──────────────────────────────────────────────
# Production-ready multi-container setup
# Usage: docker compose up -d

version: "3.9"

services:
  # ─── FastAPI Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openbenchml-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://openbenchml:openbenchml@db:5432/openbenchml
      - REDIS_URL=redis://redis:6379/0
      - USE_SQLITE=False
      - DOCKER_ENABLED=True
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-2024}
      - DEBUG=False
    volumes:
      - ./uploads:/app/uploads
      - ./datasets:/app/datasets
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - openbenchml

  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: openbenchml-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: openbenchml
      POSTGRES_PASSWORD: openbenchml
      POSTGRES_DB: openbenchml
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbenchml"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openbenchml

  # ─── Redis Cache & Message Broker ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: openbenchml-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openbenchml

  # ─── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openbenchml-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_worker:celery worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://openbenchml:openbenchml@db:5432/openbenchml
      - REDIS_URL=redis://redis:6379/0
      - USE_SQLITE=False
      - DOCKER_ENABLED=True
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-2024}
    volumes:
      - ./uploads:/app/uploads
      - ./datasets:/app/datasets
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - openbenchml

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: openbenchml-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - app
    networks:
      - openbenchml

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─── Network ─────────────────────────────────────────────────────────────────
networks:
  openbenchml:
    driver: bridge
